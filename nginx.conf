server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Use ACA's internal DNS resolver; re-resolve on each request (valid=10s)
    # so Nginx doesn't cache a stale IP when the BFF container restarts.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Proxy /api to BFF
    location /api {
        set $bff_upstream http://docvault-bff.k8se-apps.svc.cluster.local;
        proxy_pass $bff_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Allow up to 5 min for large file uploads (blob upload is synchronous)
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout 10s;
    }

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
